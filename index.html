<!DOCTYPE html>
<!--
  STAND
  NYC's 2015 Street Tree Census, grown back as a procedural forest — one branching structure per real tree record.
  Joe.K · axisbim.io

  CHANGELOG
  v1.0.0 - 2026-07-10 - Initial build: fetches a live sample from the NYC Open Data Street Tree Census
    (Socrata SODA API, dataset uvpi-gqnh), projects real lat/long onto a ground plane, and grows a seeded
    L-system branch structure per tree (mulberry32(tree_id)). Branch geometry batched into one LineSegments
    draw call, canopy into one Points draw call, for full-sample performance. Borough filter, health/species
    color modes, reseed (new random sample offset), custom orbit camera (no OrbitControls dependency —
    three@r128 via cdnjs doesn't ship the addon). Falls back to a synthetic offline sample if the API fetch fails.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="NYC's Street Tree Census grown back as a procedural forest — real tree records rendered as seeded branching structures.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stand">
<meta name="theme-color" content="#F1EBDD" id="themeColorMeta">
<title>STAND — NYC Street Tree Census, Grown</title>
<style>
  :root{
    --paper: #F1EBDD;
    --paper-deep: #E6DCC4;
    --card: #FAF6EC;
    --ink: #211D16;
    --ink-soft: #6E6252;
    --line: #D6C9A9;
    --accent: #2F5233;      /* forest green — Good health */
    --accent-deep: #1F3A23;
    --ochre: #C8932A;       /* Fair health */
    --brick: #B23A2E;       /* Poor health */
    --prussian:#1f4e79;
    --canvas-bg: #14110D;
    --shadow: 0 1px 0 rgba(33,29,22,0.05), 0 6px 16px -8px rgba(33,29,22,0.28);
    --font-display: 'Fraunces', serif;
    --font-body: 'Source Serif 4', Georgia, serif;
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  :root[data-theme="dark"]{
    --paper: #17140F;
    --paper-deep: #1E1A13;
    --card: #211C15;
    --ink: #ECE4D2;
    --ink-soft: #A79A80;
    --line: #3A3222;
    --accent: #6FA774;
    --accent-deep: #8FC494;
    --ochre: #E0AE52;
    --brick: #E0685A;
    --prussian:#5E9BD0;
    --canvas-bg: #0A0906;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--font-body); min-height:100vh;
    transition:background-color .25s ease, color .25s ease;
    overscroll-behavior-y:contain;
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
  }
  a{color:inherit;}
  ::selection{background:var(--accent); color:#fff;}
  :focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

  .btn{
    font-family:var(--font-ui); font-weight:600; font-size:13px;
    padding:9px 14px; border-radius:0;
    border:1.5px solid var(--ink); background:var(--ink); color:var(--paper);
    cursor:pointer;
  }
  .btn.secondary{background:transparent; color:var(--ink);}
  .btn.ghost{background:transparent; border-color:transparent; color:var(--ink-soft); padding:6px 8px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn.active{background:var(--accent); border-color:var(--accent-deep); color:#fff;}
  select, button{font-family:var(--font-ui); color:var(--ink); cursor:pointer;}

  header.top{
    padding:calc(20px + env(safe-area-inset-top)) 20px 14px;
    text-align:center; border-bottom:2px solid var(--line); position:relative;
  }
  header.top h1{font-family:var(--font-display); margin:0; font-size:30px; letter-spacing:0.01em;}
  header.top p{font-family:var(--font-ui); font-size:12.5px; letter-spacing:.07em; color:var(--ink-soft); margin:6px 0 0; text-transform:uppercase;}
  .theme-toggle{
    position:absolute; top:14px; right:16px; width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:17px; padding:0;
  }

  main{max-width:1180px; margin:0 auto; padding:18px 16px calc(40px + env(safe-area-inset-bottom));}

  .panel{
    background:var(--card); border:1.5px solid var(--line);
    padding:14px 16px; margin-bottom:14px;
    display:flex; flex-wrap:wrap; gap:10px 18px; align-items:center;
  }
  .panel .group{display:flex; flex-direction:column; gap:6px;}
  .panel .group label{font-family:var(--font-ui); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);}
  .row{display:flex; gap:6px; flex-wrap:wrap;}
  .stat{font-family:var(--font-mono); font-size:12px; color:var(--ink-soft);}
  .stat b{color:var(--ink); font-weight:700;}

  #viewportWrap{
    position:relative; width:100%; aspect-ratio:16/10; background:var(--canvas-bg);
    border:1.5px solid var(--line); overflow:hidden;
  }
  #viewport{display:block; width:100%; height:100%;}
  .hint{
    position:absolute; bottom:10px; left:12px; right:12px;
    font-family:var(--font-ui); font-size:11px; letter-spacing:.04em; color:rgba(241,235,221,.55);
    pointer-events:none;
  }
  .loading-overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--canvas-bg); color:var(--paper); font-family:var(--font-ui); font-size:13px;
    letter-spacing:.05em; flex-direction:column; gap:10px;
  }
  .loading-overlay.hide{display:none;}
  .spinner{width:22px; height:22px; border:2px solid rgba(241,235,221,.25); border-top-color:var(--accent); border-radius:50%; animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:12px; font-family:var(--font-ui); font-size:12px; color:var(--ink-soft);}
  .legend .sw{display:inline-block; width:10px; height:10px; margin-right:6px; vertical-align:-1px;}

  footer.foot{
    text-align:center; padding:16px 12px calc(28px + env(safe-area-inset-bottom));
    font-family:var(--font-ui); font-size:11px; letter-spacing:.06em; color:var(--ink-soft); opacity:.85;
  }

  .toast{
    position:fixed; bottom:calc(22px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); font-family:var(--font-ui); font-size:13.5px; font-weight:600;
    padding:12px 20px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:50;
    max-width:min(90vw,420px); text-align:center;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header class="top">
  <h1>STAND</h1>
  <p>NYC Street Tree Census · Grown Back as a Forest</p>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
</header>

<main id="main">

  <div class="panel">
    <div class="group">
      <label>Borough</label>
      <div class="row" id="boroughRow"></div>
    </div>
    <div class="group">
      <label>Canopy color</label>
      <div class="row" id="colorModeRow"></div>
    </div>
    <div class="group">
      <label>Sample</label>
      <div class="row">
        <button class="btn secondary" id="reseedBtn">Reseed sample</button>
      </div>
    </div>
    <div class="group" style="margin-left:auto; align-items:flex-end;">
      <span class="stat" id="statLine"><b>—</b> trees loaded</span>
    </div>
  </div>

  <div id="viewportWrap">
    <canvas id="viewport"></canvas>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div id="loadingText">Fetching live sample from NYC Open Data…</div>
    </div>
    <div class="hint">Drag to orbit · scroll to zoom · each structure is grown from one real tree record</div>
  </div>

  <div class="legend" id="legend"></div>

</main>

<footer class="foot" id="footVersion"></footer>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const APP_VERSION = '1.0.0';

/* ================= Toast ================= */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ================= mulberry32 — seeded PRNG for reproducible per-tree geometry ================= */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashString(s){
  let h = 2166136261;
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

/* ================= Health / species color ================= */
const HEALTH_COLOR = {
  Good:  new THREE.Color(0x2F5233),
  Fair:  new THREE.Color(0xC8932A),
  Poor:  new THREE.Color(0xB23A2E),
  Unknown: new THREE.Color(0x8A7E68)
};
function speciesColor(spc){
  const h = (hashString(spc||'unknown') % 360);
  const c = new THREE.Color();
  c.setHSL(h/360, 0.42, 0.5);
  return c;
}
const BARK_COLOR = new THREE.Color(0x8A7458);

/* ================= NYC bounding box → world plane projection ================= */
const LAT_MIN=40.4957, LAT_MAX=40.9153, LON_MIN=-74.2557, LON_MAX=-73.7002;
const WORLD_SIZE = 900;
function project(lat, lon){
  const x = ((lon - LON_MIN) / (LON_MAX - LON_MIN)) * WORLD_SIZE - WORLD_SIZE/2;
  const z = ((LAT_MAX - lat) / (LAT_MAX - LAT_MIN)) * WORLD_SIZE - WORLD_SIZE/2;
  return {x, z};
}

/* ================= L-system branch generator =================
   Each tree is grown from a seed derived from tree_id, so the same record always
   produces the same structure. Diameter (tree_dbh) drives overall scale + depth,
   species drives branch-angle character, health drives branch line color. */
function growTree(rec, out){
  const seed = hashString(String(rec.tree_id || (rec.lat+','+rec.lon)));
  const rng = mulberry32(seed);
  const dbh = Math.max(2, Math.min(rec.dbh || 4, 40));
  const height = 5 + dbh * 1.55;
  const depth = dbh > 22 ? 5 : dbh > 10 ? 4 : 3;
  const spHash = hashString(rec.species || 'unknown');
  const angleSpread = 0.35 + ((spHash % 100) / 100) * 0.55; // species-driven branch character, radians
  const healthColor = HEALTH_COLOR[rec.health] || HEALTH_COLOR.Unknown;
  const canopyColor = out.colorMode === 'species' ? speciesColor(rec.species) : healthColor;

  const base = new THREE.Vector3(rec.x, 0, rec.z);
  const lean = new THREE.Vector3((rng()-0.5)*0.12, 1, (rng()-0.5)*0.12).normalize();

  function branch(origin, dir, len, gen){
    const end = origin.clone().addScaledVector(dir, len);
    out.linePos.push(origin.x, origin.y, origin.z, end.x, end.y, end.z);
    const lc = gen === 0 ? BARK_COLOR : BARK_COLOR;
    out.lineCol.push(lc.r, lc.g, lc.b, lc.r, lc.g, lc.b);

    if(gen >= depth){
      out.pointPos.push(end.x, end.y, end.z);
      out.pointCol.push(canopyColor.r, canopyColor.g, canopyColor.b);
      out.pointSize.push(2.2 + dbh * 0.14 + rng()*1.2);
      return;
    }
    const children = gen === 0 ? 1 : (rng() < 0.32 ? 3 : 2);
    for(let i=0;i<children;i++){
      const yaw = (rng()-0.5) * angleSpread * 2 + (i - (children-1)/2) * angleSpread * 0.8;
      const pitch = angleSpread * (0.4 + rng()*0.5);
      const nd = dir.clone();
      const axis = new THREE.Vector3(1,0,0).cross(nd).length() > 0.01
        ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
      nd.applyAxisAngle(new THREE.Vector3(1,0,0), pitch * (rng()<0.5?1:-1));
      nd.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
      nd.normalize();
      branch(end, nd, len * (0.62 + rng()*0.12), gen+1);
    }
  }
  branch(base, lean, height * 0.36, 0);
}

/* ================= Data layer ================= */
const SODA_BASE = 'https://data.cityofnewyork.us/resource/uvpi-gqnh.json';
const SAMPLE_LIMIT = 3500;
let cache = {}; // borough -> raw records

function buildUrl(borough, offset){
  let where = "status='Alive' AND latitude IS NOT NULL AND longitude IS NOT NULL AND tree_dbh IS NOT NULL";
  if(borough && borough !== 'All') where += ` AND boroname='${borough}'`;
  const params = new URLSearchParams({
    '$select': 'tree_id,spc_common,tree_dbh,health,boroname,latitude,longitude',
    '$where': where,
    '$limit': String(SAMPLE_LIMIT),
    '$offset': String(offset)
  });
  return `${SODA_BASE}?${params.toString()}`;
}

async function fetchSample(borough, offset){
  const url = buildUrl(borough, offset);
  const res = await fetch(url);
  if(!res.ok) throw new Error('NYC Open Data request failed: ' + res.status);
  const rows = await res.json();
  return rows.map(r => ({
    tree_id: r.tree_id,
    species: (r.spc_common || 'unknown').trim() || 'unknown',
    dbh: parseFloat(r.tree_dbh) || 4,
    health: r.health || 'Unknown',
    borough: r.boroname,
    lat: parseFloat(r.latitude),
    lon: parseFloat(r.longitude)
  })).filter(r => isFinite(r.lat) && isFinite(r.lon));
}

/* Synthetic offline fallback — used only if the live fetch fails (blocked network, CORS, etc). */
function syntheticSample(borough){
  const boroughBounds = {
    Manhattan:   {lat:[40.700,40.880], lon:[-74.020,-73.910]},
    Brooklyn:    {lat:[40.570,40.740], lon:[-74.045,-73.850]},
    Queens:      {lat:[40.540,40.800], lon:[-73.960,-73.700]},
    Bronx:       {lat:[40.785,40.915], lon:[-73.935,-73.765]},
    'Staten Island': {lat:[40.495,40.650], lon:[-74.255,-74.050]}
  };
  const species = ['London planetree','Callery pear','Honeylocust','Pin oak','Norway maple','Japanese zelkova','Ginkgo','Little-leaf linden'];
  const healths = ['Good','Good','Good','Fair','Fair','Poor'];
  const rng = mulberry32(20260710);
  const boroughs = borough === 'All' ? Object.keys(boroughBounds) : [borough];
  const out = [];
  const perBorough = Math.floor(700 / boroughs.length);
  boroughs.forEach(b=>{
    const bb = boroughBounds[b];
    for(let i=0;i<perBorough;i++){
      out.push({
        tree_id: b + '-' + i,
        species: species[Math.floor(rng()*species.length)],
        dbh: 3 + rng()*28,
        health: healths[Math.floor(rng()*healths.length)],
        borough: b,
        lat: bb.lat[0] + rng()*(bb.lat[1]-bb.lat[0]),
        lon: bb.lon[0] + rng()*(bb.lon[1]-bb.lon[0])
      });
    }
  });
  return out;
}

/* ================= Three.js scene ================= */
let renderer, scene, camera;
let forestLines = null, forestPoints = null, groundGrid = null;
let camDist = 620, camTheta = 0.75, camPhi = 1.15;
const camTarget = new THREE.Vector3(0, 40, 0);

function initScene(){
  const canvas = document.getElementById('viewport');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  scene = new THREE.Scene();
  scene.background = new THREE.Color(getComputedColor('--canvas-bg'));
  camera = new THREE.PerspectiveCamera(42, 1, 1, 4000);
  updateCamera();

  const grid = new THREE.GridHelper(WORLD_SIZE, 30, 0x3A3222, 0x24201A);
  grid.position.y = 0;
  scene.add(grid);
  groundGrid = grid;

  resizeRenderer();
  window.addEventListener('resize', resizeRenderer);
  attachOrbitControls(canvas);
  animate();
}
function getComputedColor(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim() || '#14110D';
}
function resizeRenderer(){
  const wrap = document.getElementById('viewportWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
function updateCamera(){
  const x = camTarget.x + camDist * Math.sin(camPhi) * Math.cos(camTheta);
  const y = camTarget.y + camDist * Math.cos(camPhi);
  const z = camTarget.z + camDist * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(camTarget);
}
/* Custom orbit — three@r128 via cdnjs doesn't ship the OrbitControls addon as a loadable
   single script here, so this is a minimal self-contained drag/zoom implementation. */
function attachOrbitControls(el){
  let dragging = false, lastX=0, lastY=0;
  el.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; el.setPointerCapture(e.pointerId); });
  el.addEventListener('pointerup', e=>{ dragging=false; });
  el.addEventListener('pointercancel', ()=>{ dragging=false; });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    camTheta -= dx * 0.006;
    camPhi = Math.max(0.15, Math.min(Math.PI/2 - 0.02, camPhi - dy * 0.006));
    updateCamera();
  });
  el.addEventListener('wheel', e=>{
    e.preventDefault();
    camDist = Math.max(80, Math.min(2200, camDist + e.deltaY * 0.5));
    updateCamera();
  }, {passive:false});
}
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

/* ================= Build forest geometry from current records ================= */
let currentRecords = [];
let colorMode = 'health';

function rebuildForest(records){
  if(forestLines){ scene.remove(forestLines); forestLines.geometry.dispose(); forestLines.material.dispose(); }
  if(forestPoints){ scene.remove(forestPoints); forestPoints.geometry.dispose(); forestPoints.material.dispose(); }

  const out = {linePos:[], lineCol:[], pointPos:[], pointCol:[], pointSize:[], colorMode};
  records.forEach(rec=>{
    const p = project(rec.lat, rec.lon);
    growTree({...rec, x:p.x, z:p.z}, out);
  });

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(out.linePos, 3));
  lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(out.lineCol, 3));
  const lineMat = new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.85});
  forestLines = new THREE.LineSegments(lineGeo, lineMat);
  scene.add(forestLines);

  const ptGeo = new THREE.BufferGeometry();
  ptGeo.setAttribute('position', new THREE.Float32BufferAttribute(out.pointPos, 3));
  ptGeo.setAttribute('color', new THREE.Float32BufferAttribute(out.pointCol, 3));
  const ptMat = new THREE.PointsMaterial({size:3.2, vertexColors:true, sizeAttenuation:true, transparent:true, opacity:0.92});
  forestPoints = new THREE.Points(ptGeo, ptMat);
  scene.add(forestPoints);

  document.getElementById('statLine').innerHTML = `<b>${records.length.toLocaleString()}</b> trees loaded`;
}

/* ================= UI: borough + color mode + legend ================= */
const BOROUGHS = ['All','Manhattan','Brooklyn','Queens','Bronx','Staten Island'];
let activeBorough = 'All';

function renderBoroughRow(){
  const row = document.getElementById('boroughRow');
  row.innerHTML = BOROUGHS.map(b =>
    `<button class="btn secondary${b===activeBorough?' active':''}" data-borough="${escapeAttr(b)}">${escapeHtml(b)}</button>`
  ).join('');
  row.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=> selectBorough(btn.dataset.borough));
  });
}
function renderColorModeRow(){
  const row = document.getElementById('colorModeRow');
  const modes = [['health','Health'],['species','Species']];
  row.innerHTML = modes.map(([v,label])=>
    `<button class="btn secondary${v===colorMode?' active':''}" data-mode="${v}">${label}</button>`
  ).join('');
  row.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      colorMode = btn.dataset.mode;
      renderColorModeRow();
      renderLegend();
      if(currentRecords.length) rebuildForest(currentRecords);
    });
  });
}
function renderLegend(){
  const legend = document.getElementById('legend');
  if(colorMode === 'health'){
    legend.innerHTML = [
      ['Good','#2F5233'], ['Fair','#C8932A'], ['Poor','#B23A2E'], ['Unknown','#8A7E68']
    ].map(([label,hex])=>`<span><span class="sw" style="background:${hex}"></span>${label}</span>`).join('');
  } else {
    legend.innerHTML = `<span>Canopy hue is derived from each record's species name — consistent per species, varies across the sample.</span>`;
  }
}

async function selectBorough(b){
  activeBorough = b;
  renderBoroughRow();
  await loadAndRender(b, true);
}

function setLoading(on, text){
  const ov = document.getElementById('loadingOverlay');
  if(text) document.getElementById('loadingText').textContent = text;
  ov.classList.toggle('hide', !on);
}

async function loadAndRender(borough, forceRefetch){
  const key = borough;
  if(!forceRefetch && cache[key]){
    currentRecords = cache[key];
    rebuildForest(currentRecords);
    return;
  }
  setLoading(true, 'Fetching live sample from NYC Open Data…');
  const offset = Math.floor(Math.random() * 400000);
  try{
    const rows = await fetchSample(borough, offset);
    if(!rows.length) throw new Error('empty response');
    cache[key] = rows;
    currentRecords = rows;
    rebuildForest(rows);
    toast(`Loaded ${rows.length.toLocaleString()} live records`);
  } catch(err){
    console.warn('STAND: live fetch failed, using offline sample —', err.message);
    const rows = syntheticSample(borough);
    cache[key] = rows;
    currentRecords = rows;
    rebuildForest(rows);
    toast('Network blocked — showing an offline synthetic sample instead');
  } finally {
    setLoading(false);
  }
}

document.getElementById('reseedBtn').addEventListener('click', ()=> loadAndRender(activeBorough, true));

/* ================= Theme ================= */
function currentTheme(){ return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
function applyThemeChrome(){
  const dark = currentTheme() === 'dark';
  document.getElementById('themeToggle').textContent = dark ? '☀️' : '🌙';
  document.getElementById('themeColorMeta').setAttribute('content', dark ? '#17140F' : '#F1EBDD');
  if(scene) scene.background = new THREE.Color(getComputedColor('--canvas-bg'));
}
function toggleTheme(){
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  applyThemeChrome();
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

/* ================= Boot ================= */
(function boot(){
  applyThemeChrome();
  document.getElementById('footVersion').innerHTML =
    `STAND · v${APP_VERSION} · Joe.K · <a href="https://axisbim.io" target="_blank" rel="noopener">axisbim.io</a> · data: NYC Open Data, 2015 Street Tree Census`;
  renderBoroughRow();
  renderColorModeRow();
  renderLegend();
  initScene();
  loadAndRender('All', true);
})();
</script>
</body>
